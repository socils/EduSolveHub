<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    <style>
        body { margin: 0; background: #121212; }
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #4A90E2;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="loader">Cargando sistema...</div>
    <div id="contenido-real"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            cargarTodo();
        });

        async function cargarTodo() {
            const loader = document.getElementById('loader');
            const contenedor = document.getElementById('contenido-real');

            try {
                const respuesta = await fetch('menuTRUE.html'); 
                if (!respuesta.ok) throw new Error();

                const html = await respuesta.text();
                const parser = new DOMParser();
                const docVirtual = parser.parseFromString(html, 'text/html');
                
                if (docVirtual.title) {
                    document.title = docVirtual.title;
                }

                loader.style.display = 'none';
                contenedor.innerHTML = html;

                const scripts = contenedor.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch (error) {
                if (loader) loader.innerHTML = "❌ Error de carga.";
            }
        }
    </script>
</body>
</html>
