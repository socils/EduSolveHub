<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EduSolve | Cargando...</title>
    <style>
        body { margin: 0; background: #0f172a; color: #38bdf8; font-family: sans-serif; }
        #loader { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="loader">Iniciando EduSolve PRO...</div>
    <div id="contenido-real"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Transferencia completa de identidad
                localStorage.setItem('user_uid', user.uid);
                localStorage.setItem('eduSolve_User', user.displayName || "Estudiante");
                cargarPagina();
            } else {
                document.getElementById('loader').innerHTML = "Acceso restringido.";
            }
        });

        async function cargarPagina() {
            const loader = document.getElementById('loader');
            const contenedor = document.getElementById('contenido-real');
            try {
                const respuesta = await fetch('menuTRUE.html');
                const html = await respuesta.text();
                
                const parser = new DOMParser();
                const docVirtual = parser.parseFromString(html, 'text/html');
                if (docVirtual.title) document.title = docVirtual.title;

                loader.style.display = 'none';
                contenedor.innerHTML = html;

                const scripts = contenedor.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch (e) {
                loader.innerHTML = "❌ Error de conexión.";
            }
        }
    </script>
</body>
</html>
