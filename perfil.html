<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil - EduSolve PRO</title>
    
    <!-- SDK de Firebase (Versión 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* --- ESTILOS (Mantenemos tus estilos originales) --- */
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .profile-pic-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        #user-display { width: 100%; height: 100%; background: #2563eb; color: white; font-size: 3rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; overflow: hidden; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #user-display img { width: 100%; height: 100%; object-fit: cover; }
        #file-input { display: none; }
        .edit-pic-label { position: absolute; bottom: 5px; right: 5px; background: #1e293b; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
        .badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; background: #f1f5f9; color: #64748b; margin-bottom: 20px; text-transform: uppercase; }
        .data-section { text-align: left; background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e2e8f0; }
        .label { font-size: 0.8rem; color: #64748b; font-weight: 600; }
        .value { font-size: 0.9rem; color: #1e293b; font-weight: 700; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 12px; border-radius: 12px; font-weight: bold; text-decoration: none; border: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; text-align: center; }
        .btn-main { background: #2563eb; color: white; }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-pic-container">
        <div id="user-display">...</div>
        <label for="file-input" class="edit-pic-label">📷</label>
        <input type="file" id="file-input" accept="image/*" onchange="subirImagen(event)">
    </div>

    <h2 id="display-name" style="margin:0; color: #1e293b;">Cargando...</h2>
    <div class="badge" id="user-role">MIEMBRO</div>

    <div class="data-section">
        <div class="data-row"><span class="label">Puntos:</span> <span class="value" id="val-puntos">0 Pts</span></div>
        <div class="data-row"><span class="label">ID de Usuario:</span> <span class="value" id="val-uid" style="font-size:0.6rem">---</span></div>
    </div>

    <div class="btn-group">
        <a href="menu.html" class="btn btn-main">Volver al Inicio</a>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN FIREBASE (Usa la tuya)
    const firebaseConfig = {
        apiKey: "AIzaSyDffVQzP6yaiUX4SsE3ghoBBBGyr7thMFs",
        authDomain: "edusolve-947c1.firebaseapp.com",
        projectId: "edusolve-947c1",
        storageBucket: "edusolve-947c1.firebasestorage.app",
        messagingSenderId: "1089784819674",
        appId: "1:1089784819674:web:5f0e310b0a8ae699191ae3"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
// --- Lógica de Recepción en Perfil.html ---
document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const usuarioRecibido = params.get('user');

    if (usuarioRecibido) {
        // 1. Mostrar el nombre de inmediato para quitar el "Cargando"
        const nombreDisplay = document.getElementById('display-name');
        if(nombreDisplay) nombreDisplay.innerText = decodeURIComponent(usuarioRecibido);
        
        // 2. Aquí ya puedes llamar a Firebase usando ese nombre o ID
        cargarDatosDeFirebase(decodeURIComponent(usuarioRecibido));
    } else {
        // Si alguien entra a perfil.html a secas, lo regresamos al menu
        console.warn("No se detectó usuario en la URL");
        // location.href = 'menu.html'; 
    }
});
    // 2. CARGAR DATOS EN TIEMPO REAL
    // --- CORRECCIÓN PERFIL.HTML ---
// 1. Obtener el ID que envió el Menú desde la URL
const urlParams = new URLSearchParams(window.location.search);
const userIdDirecto = urlParams.get('id');

auth.onAuthStateChanged((user) => {
    // Usamos el ID de la URL o el del usuario logueado
    const uidFinal = userIdDirecto || (user ? user.uid : null);

    if (uidFinal) {
        const userRef = db.collection("usuarios").doc(uidFinal);
        
        userRef.onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                
                // MOSTRAR DATOS AL INSTANTE
                document.getElementById('display-name').innerText = data.n || "Usuario";
                document.getElementById('val-puntos').innerText = (data.puntos || 0) + " Pts";
                document.getElementById('val-uid').innerText = uidFinal;

                // Cargar Foto Cloud
                const userDisplay = document.getElementById('user-display');
                if (data.foto) {
                    userDisplay.innerHTML = `<img src="${data.foto}" style="width:100%; height:100%; object-fit:cover;">`;
                } else {
                    userDisplay.innerText = (data.n || "U").charAt(0).toUpperCase();
                }
            } else {
                // Si el ID es válido pero no hay documento, mostrar error claro
                document.getElementById('display-name').innerText = "Usuario no encontrado";
            }
        });
    } else {
        window.location.href = "index.html";
    }
});

    // 3. SUBIR IMAGEN A FIREBASE (Campo 'foto')
    function subirImagen(event) {
        const archivo = event.target.files[0];
        const user = auth.currentUser;

        if (archivo && user) {
            // Validar tamaño (Base64 puede ser pesado, máximo 1MB recomendado)
            if (archivo.size > 1048576) {
                alert("La imagen es muy grande. Intenta con una de menos de 1MB.");
                return;
            }

            const lector = new FileReader();
            lector.onload = async function(e) {
                const base64String = e.target.result;
                
                try {
                    await db.collection("usuarios").doc(user.uid).update({
                        foto: base64String // Guardamos en el campo 'foto'
                    });
                    console.log("Foto actualizada en Firebase");
                } catch (error) {
                    console.error("Error al subir foto:", error);
                }
            };
            lector.readAsDataURL(archivo);
        }
    }
</script>
</body>
</html>
