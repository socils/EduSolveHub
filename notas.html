<!DOCTYPE html>
<html lang="es">
<head><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 x=%2250%%22 text-anchor=%22middle%22 font-size=%2260%22 font-family=%22Arial, sans-serif%22 font-weight=%22bold%22 fill=%22white%22>es</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas - EduSolve PRO</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* ÁREA DE TEXTO ESTILO LIBRETA */
        .notepad {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .notepad::before {
            content: "";
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #fee2e2; /* Línea roja de cuaderno */
        }

        textarea {
            width: 100%;
            height: 400px;
            border: none;
            outline: none;
            resize: none;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #334155;
            background: transparent;
            padding-left: 35px;
            font-family: 'Courier New', Courier, monospace; /* Fuente estilo máquina de escribir */
        }

        .status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .save-tag {
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
            display: none; /* Se activa al guardar */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="btn-back">← Volver al Inicio</a>
        <h2 style="margin:0; color: #1e293b;">📝 Mis Notas</h2>
    </div>

    <div class="notepad">
        <textarea id="note-area" placeholder="Escribe aquí tus tareas, apuntes o filtraciones..."></textarea>
    </div>

    <div class="status">
        <span id="char-count">0 caracteres</span>
        <span id="save-status" class="save-tag">✓ Guardado automáticamente</span>
    </div>
</div>

<script>
    const textarea = document.getElementById('note-area');
    const charCount = document.getElementById('char-count');
    const saveStatus = document.getElementById('save-status');

    // 1. CARGAR NOTA AL ABRIR
    window.onload = () => {
        const savedNote = localStorage.getItem('edusolve_notes');
        if (savedNote) {
            textarea.value = savedNote;
            updateCount();
        }
    };

    // 2. GUARDAR MIENTRAS ESCRIBES (Auto-save)
    textarea.addEventListener('input', () => {
        localStorage.setItem('edusolve_notes', textarea.value);
        updateCount();
        
        // Mostrar aviso de guardado
        saveStatus.style.display = 'inline-block';
        setTimeout(() => {
            saveStatus.style.display = 'none';
        }, 1500);
    });

    function updateCount() {
        charCount.innerText = textarea.value.length + " caracteres";
    }
</script>

</body>
</html>
