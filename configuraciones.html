<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes - Alonixz v3.5</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        /* Estilos base */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: 0.3s;
        }

        .config-container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .header h1 { font-size: 1.4rem; margin: 0; }

        /* Estilo de las filas de ajuste */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .setting-info h3 { font-size: 0.95rem; margin: 0; color: var(--text); }
        .setting-info p { font-size: 0.75rem; margin: 4px 0 0; color: #64748b; }

        /* Switch / Toggle moderno */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 30px;
            text-decoration: none;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* --- MODO OSCURO --- */
        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }
    </style>
</head>
<body>

<div class="config-container">
    <div class="header">
        <span style="font-size: 1.5rem;">⚙️</span>
        <h1>Ajustes del Sistema</h1>
    </div>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Modo Oscuro</h3>
            <p>Protege tu vista durante la noche.</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="dark-mode-toggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Notificaciones de Agenda</h3>
            <p>Avisar cuando Alonso publique un examen.</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="notif-toggle" onclick="toggleNotificaciones()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="setting-row">
        <div class="setting-info">
            <h3>Efectos de Sonido</h3>
            <p>Activar sonidos al navegar en el menú.</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="sound-toggle" onclick="toggleSonidos()">
            <span class="slider"></span>
        </label>
    </div>

    <a href="menu.html" class="btn-back">← Volver al Menú Principal</a>
    
    <p style="text-align: center; font-size: 10px; color: #94a3b8; margin-top: 20px; font-weight: bold;">
        ALONIXZ-GROUP V3.5 • AREQUIPA 2026
    </p>
</div>

<script>
    // Al cargar la página, aplicamos los estados guardados
    window.onload = function() {
        // Cargar Modo Oscuro
        const isDark = localStorage.getItem('alonixz_dark_mode') === 'true';
        document.getElementById('dark-mode-toggle').checked = isDark;
        if(isDark) document.body.classList.add('dark-mode');

        // Cargar Notificaciones
        const isNotif = localStorage.getItem('alonixz_notif') === 'true';
        document.getElementById('notif-toggle').checked = isNotif;

        // Cargar Sonidos
        const isSound = localStorage.getItem('alonixz_sound') === 'true';
        document.getElementById('sound-toggle').checked = isSound;
    };

    function toggleDarkMode() {
        const checkbox = document.getElementById('dark-mode-toggle');
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('alonixz_dark_mode', checkbox.checked);
    }

    function toggleNotificaciones() {
        const checkbox = document.getElementById('notif-toggle');
        localStorage.setItem('alonixz_notif', checkbox.checked);
    }

    function toggleSonidos() {
        const checkbox = document.getElementById('sound-toggle');
        localStorage.setItem('alonixz_sound', checkbox.checked);
    }
</script>

</body>
</html>
