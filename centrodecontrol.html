function verificarAcceso() {
    // 1. Miramos si ya entró antes en esta sesión
    let accesoConcedido = sessionStorage.getItem('admin_auth');

    if (accesoConcedido !== "true") {

        let pass = prompt("🔐 Acceso Restringido - Alonixz-Group\nIntroduce la contraseña de Administrador:");

        if (pass === CLAVE_MAESTRA) {

            mostrarPanel();

        }
    } else {
        mostrarPanel();
    }
}

function mostrarPanel() {
    // Esta función se asegura de que el panel sea visible

    if(panel) panel.style.display = 'block';
}

// Ejecutar al cargar la página

    // Mostramos un saludo en el panel
    const saludo = document.getElementById('saludo-admin');

// Reloj de 15 minutos
let tiempoRestante = 15 * 60;
const displayReloj = document.getElementById('reloj');

const contador = setInterval(() => {
    let mins = Math.floor(tiempoRestante / 60);
    let segs = tiempoRestante % 60;
    displayReloj.innerText = `${mins}:${segs < 10 ? '0' + segs : segs}`;

    if (tiempoRestante <= 120) displayReloj.classList.add('alerta-roja');

    if (tiempoRestante <= 0) {
        clearInterval(contador);
        alert("SESIÓN EXPIRADA.");
        sessionStorage.clear();
        window.location.href = "index.html";
    }
    tiempoRestante--;
}, 1000);

// --- 3. FUNCIONES DE NOVEDADES (RAMA: noticias) ---
// --- FUNCIONES DEL PANEL DE CONTROL v 3.3 ---

// A. PUBLICAR CON CAMPO DE COMPLETADO
function publicarNovedad() {
    const texto = document.getElementById('novedad-texto').value;
    const tagSelec = document.getElementById('novedad-tag').value;
    const autorLog = sessionStorage.getItem('moderador_nombre') || "Alonso";

    if (texto.trim() === "") return alert("Escribe el contenido.");

    db.ref('noticias').push({
        titulo: texto,
        tag: tagSelec,
        autor: autorLog,
        fecha: new Date().toLocaleDateString(),
        completado: false // Por defecto empieza sin check
    })
    .then(() => {
        document.getElementById('novedad-texto').value = "";
        console.log("Publicado en Alonixz-Group");
    });
}

// B. ESCUCHAR Y MOSTRAR (Con botón de Check para el moderador)
db.ref('noticias').on('value', (snapshot) => {
    const contenedor = document.getElementById('contenedor-novedades');
    if (!contenedor) return;
    contenedor.innerHTML = ""; 

    snapshot.forEach((childSnapshot) => {
        const id = childSnapshot.key;
        const data = childSnapshot.val();
        
        // Si está completado, ponemos el icono
        const statusIcon = data.completado ? "✅" : "⭕";

        contenedor.innerHTML += `
            <div class="novedad-item" style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-size:1.2rem; margin-right:10px;">${statusIcon}</span>
                    <b>[${data.tag}]</b> ${data.titulo}
                </div>
                <div>
                    <button onclick="toggleCheck('${id}', ${data.completado})" style="background:#2ecc71; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Check</button>
                    <button onclick="eliminarNovedad('${id}')" style="background:#ff4757; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">X</button>
                </div>
            </div>
        `;
    });
});

// C. FUNCIÓN PARA ACTIVAR/DESACTIVAR EL CHECK
function toggleCheck(id, estadoActual) {
    db.ref('noticias/' + id).update({
        completado: !estadoActual
    });
}

function eliminarNovedad(id) {
    if(confirm("¿Eliminar?")) db.ref('noticias/' + id).remove();
}   
function marcarCompletado(id, estadoActual) {

    });
}

// --- FUNCIÓN PARA SUBIR RESPUESTAS ACTUALIZADA ---
function subirRespuesta() {
    const materia = document.getElementById('res-materia').value;
    const tema = document.getElementById('res-tema').value;
    const contenido = document.getElementById('res-link').value; // Aquí va el texto descriptivo

    if (materia === "" || tema === "" || contenido === "") {
        alert("Completa todos los campos para Alonixz-Group");
        return;
    }

    db.ref('soluciones').push({
        materia: materia,
        tema: tema,
        descripcion: contenido, // Guardamos el texto como descripción
        autor: "Alonso",
        fecha: new Date().toLocaleDateString()
    }).then(() => {
        alert("✅ Descripción publicada");
        document.getElementById('res-tema').value = "";
        document.getElementById('res-link').value = "";
    });
}
// --- FUNCIÓN PARA VER LA LISTA Y PODER BORRAR ---
db.ref('soluciones').on('value', (snapshot) => {
    const lista = document.getElementById('lista-admin-respuestas');
    if (!lista) return;
    lista.innerHTML = "";

    snapshot.forEach((child) => {
        const d = child.val();
        lista.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f8fafc; border-radius:8px; margin-bottom:5px; border:1px solid #eee;">
                <span style="font-size:0.85rem;"><b>${d.materia}:</b> ${d.tema}</span>
                <button onclick="eliminarRespuesta('${child.key}')" style="background:#ff4757; color:white; border:none; padding:4px 8px; border-radius:5px; cursor:pointer;">Borrar</button>
            </div>
        `;
    });
});

function eliminarRespuesta(id) {

        db.ref('soluciones/' + id).remove();

}
