<!DOCTYPE html>
<html lang="es">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 10 L85 85 M50 10 L15 85 M30 50 L70 50%22 fill=%22none%22 stroke=%22%2338bdf8%22 stroke-width=%2210%22/><path d=%22M75 65 L95 45 L80 50 L75 65 Z%22 fill=%22%23fbbf24%22/></svg>">
    <meta charset="UTF-8">
    <title>EduSolve | Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor con Animación de Entrada */
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Transición entre Login y Registro */
        .fade-content {
            transition: opacity 0.3s ease;
        }

        .fade-out { opacity: 0; }

        h2 { font-weight: 800; margin-bottom: 5px; color: #1e293b; }
        p { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }/* --- ESTILO PARA LAPTOP (IGUAL QUE SIEMPRE) --- */
.card {
    width: 500px;
    padding: 40px;
}

/* --- ESTILO SOLO PARA CELULARES --- */
@media (max-width: 600px) {
    .card {
        width: 90%;   /* En celular la carta ocupa casi todo el ancho */
        padding: 15px; /* Menos espacio interno para que quepa el texto */
    }
    
    #welcome-name {
        font-size: 1.5rem; /* Título más cómodo para el dedo */
    }

    /* El panel admin se hace más grande para tocarlo fácil */
    #admin-panel div {
        width: 95% !important;
    }
}

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* Alerta de Dispositivo Local */
        .device-alert {
            margin-top: 25px;
            padding: 12px;
            background: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 10px;
            color: #9a3412;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; }
    </style>
</head>
<body>

<div class="auth-card" id="card">
    <div class="fade-content" id="form-content">
        <div class="logo-dot"></div>
        <h2 id="title">EduSolve ID</h2>
        <p id="subtitle">Ingresa para ver tareas y exámenes</p>
        
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; justify-content: flex-start; padding-left: 5px;">
    <input type="checkbox" id="remember" style="width: auto; margin: 0; cursor: pointer;">
    <label for="remember" style="font-size: 0.8rem; color: #64748b; cursor: pointer; user-select: none;">Mantener sesión iniciada</label>
</div>
        <button onclick="handleAuth()" id="main-btn">Entrar al Panel</button>
        
        <p style="margin-top: 20px;">
            <span id="toggle-text">¿No tienes cuenta?</span> 
            <a href="#" onclick="toggleMode()" style="color: var(--primary); text-decoration: none; font-weight: 700;">Hazlo aquí</a>
        </p>

      <div class="device-alert" style="background: #ecfdf5; border-color: #a7f3d0; color: #065f46;">
    <span>🌐</span>
    <span>Cuenta Alonixz-ID: Tus datos se guardan en la nube y funcionan en cualquier equipo.</span>
</div>
    </div>
</div>
<!-- 1. LIBRERÍAS DE FIREBASE (Versión Compat) -->
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-firestore-compat.js"></script>

<!-- 2. TU CONFIGURACIÓN (Debe estar debajo de las librerías) -->
<script  src="firebase-config.js"></script>

<script>
    let isLogin = true;

    // Verificar si Firebase cargó correctamente al abrir la página
    window.onload = () => {
        if (typeof firebase === 'undefined') {
            console.error("❌ Error: Firebase no se cargó. Revisa tu conexión o el archivo config.");
        } else {
            console.log("🚀 Alonixz-Cloud Conectado");
        }
    };

    function toggleMode() {
        const content = document.getElementById('form-content');
        content.classList.add('fade-out');

        setTimeout(() => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "EduSolve ID" : "Crear Usuario";
            document.getElementById('subtitle').innerText = isLogin ? "Ingresa para ver tareas y exámenes" : "Regístrate en la nube Alonixz";
            document.getElementById('main-btn').innerText = isLogin ? "Entrar al Panel" : "Registrar ahora";
            document.getElementById('toggle-text').innerText = isLogin ? "¿No tienes cuenta?" : "¿Ya tienes cuenta?";
            content.classList.remove('fade-out');
        }, 300);
    }
// CONFIGURACIÓN DEL EVENTO 3.5function lanzarEvento35() {
    console.log("⏳ Iniciando contador de 8 segundos para el evento...");
    
    setTimeout(() => {
        // Creamos el Modal Dinámico
        const modal = document.createElement('div');
        modal.id = "modal-v35";
        modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999; font-family:sans-serif; text-align:center; padding:20px;";
        
        modal.innerHTML = `
            <div style="background:white; padding:30px; border-radius:15px; max-width:500px; width:90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                <img src="actualizacion5.png" alt="Update 3.5" style="width:100%; border-radius:10px; margin-bottom:20px;">
                <h2 style="color:#1e293b; margin-bottom:10px;">¡MIGRACIÓN OBLIGATORIA!</h2>
                <p style="color:#64748b; margin-bottom:20px;">Alonixz-Group ha evolucionado a la Nube. Tu acceso local será eliminado para proteger tus datos.</p>
                <button onclick="ejecutarMigracionFinal()" style="background:#2563eb; color:white; border:none; padding:12px 25px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">MIGRAR AHORA</button>
            </div>
        `;
        document.body.appendChild(modal);
    }, 8000); // 8 segundos exactos
}

function ejecutarMigracionFinal() {
    console.log("🧹 Limpiando datos antiguos...");
    localStorage.removeItem('user_name');
    localStorage.removeItem('user_pass');
    localStorage.removeItem('eduSolve_User'); // Limpiamos todo
    localStorage.setItem('alonixz_v35_nube', 'pending');
    
    alert("🚀 ¡Sincronizando con Alonixz-Cloud! Por favor, crea tu nueva cuenta.");
    location.reload(); // Esto recargará la página y, como ya no hay user_name, el modal no saldrá y podrán registrarse
}
async function verificarMigracion() {
    try {
        const doc = await firebase.firestore().collection("sistema").doc("configuracion").get();
        
        if (doc.exists) {
            const data = doc.data();
            // 🛠️ Convertimos el texto "3.5" a número 3.5
            const versionServer = Number(data.version_minima); 
            
            console.log("✅ Versión detectada:", versionServer);

            const yaMigrado = localStorage.getItem('alonixz_v35_nube');
            const usuarioAntiguo = localStorage.getItem('user_name');

            // Si la versión es 3.5 o superior y no ha migrado
            if (versionServer >= 3.5 && yaMigrado !== 'true' && usuarioAntiguo) {
                // Se dispara el evento que creamos
                lanzarEvento35(); 
            }
        }
    } catch (e) {
        console.error("Error en el sistema de versiones:", e);
    }
}

// Se ejecuta automático al abrir la página
verificarMigracion();
async function handleAuth() {
    if (typeof firebase === 'undefined') return alert("Error de sistema: Firebase no definido.");

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked; 
    
    if(!user || !pass) return alert("Completa todos los campos.");

    const fakeEmail = `${user.toLowerCase()}@alonixz.com`;

    try {
        if (isLogin) {
            // --- LOGIN ---
            const userCredential = await firebase.auth().signInWithEmailAndPassword(fakeEmail, pass);
            const fbUser = userCredential.user;

            const userDoc = await firebase.firestore().collection("usuarios").doc(fbUser.uid).get();
            const userData = userDoc.data() || {};

            localStorage.setItem('eduSolve_User', user); 
            localStorage.setItem('user_name', user);
            localStorage.setItem('user_rank', userData.rango || 'Estudiante');
            localStorage.setItem('user_points', userData.puntos || 0);

            if (remember) localStorage.setItem('remember_me', 'true');

            window.location.href = 'menu.html';

        } else { 
            // --- REGISTRO ---
            if (pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres.");

            const userCredential = await firebase.auth().createUserWithEmailAndPassword(fakeEmail, pass);
            const fbUser = userCredential.user;

            await firebase.firestore().collection("usuarios").doc(fbUser.uid).set({
                n: user,
                rango: "Estudiante",
                puntos: 50, 
                creado: new Date().toISOString()
            });

            localStorage.setItem('eduSolve_User', user); 
            localStorage.setItem('alonixz_v35_nube', 'true'); 

            alert("¡Cuenta Alonixz-ID en la Nube creada! Bienvenido a la v3.5.");
            window.location.href = 'menu.html'; 
        }
    } catch (error) {
        console.error("Detalles del Error:", error.code, error.message);
        
        const errors = {
            'auth/operation-not-allowed': "❌ Debes activar 'Email/Password' en la consola de Firebase.",
            'auth/invalid-email': "❌ El nombre de usuario tiene caracteres no permitidos.",
            'auth/email-already-in-use': "❌ Este nombre de usuario ya está registrado en la nube.",
            'auth/weak-password': "❌ La contraseña es muy corta.",
            'auth/user-not-found': "❌ El usuario no existe en la nube.",
            'auth/wrong-password': "❌ Contraseña incorrecta."
        };

        alert(errors[error.code] || "Error Alonixz-Cloud: " + error.message);
    }
}
</script>

</body>
</html>
