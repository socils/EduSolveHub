<!DOCTYPE html>
<html lang="es">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 10 L85 85 M50 10 L15 85 M30 50 L70 50%22 fill=%22none%22 stroke=%22%2338bdf8%22 stroke-width=%2210%22/><path d=%22M75 65 L95 45 L80 50 L75 65 Z%22 fill=%22%23fbbf24%22/></svg>">
    <meta charset="UTF-8">
    <title>EduSolve | Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor con Animación de Entrada */
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Transición entre Login y Registro */
        .fade-content {
            transition: opacity 0.3s ease;
        }

        .fade-out { opacity: 0; }

        h2 { font-weight: 800; margin-bottom: 5px; color: #1e293b; }
        p { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }/* --- ESTILO PARA LAPTOP (IGUAL QUE SIEMPRE) --- */
.card {
    width: 500px;
    padding: 40px;
}

/* --- ESTILO SOLO PARA CELULARES --- */
@media (max-width: 600px) {
    .card {
        width: 90%;   /* En celular la carta ocupa casi todo el ancho */
        padding: 15px; /* Menos espacio interno para que quepa el texto */
    }
    
    #welcome-name {
        font-size: 1.5rem; /* Título más cómodo para el dedo */
    }

    /* El panel admin se hace más grande para tocarlo fácil */
    #admin-panel div {
        width: 95% !important;
    }
}

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* Alerta de Dispositivo Local */
        .device-alert {
            margin-top: 25px;
            padding: 12px;
            background: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 10px;
            color: #9a3412;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; }
    </style>
</head>
<body>
<div style="display: flex; align-items: center; gap: 15px; padding: 10px;">
    <svg viewBox="0 0 100 100" style="width: 50px; height: 50px;">
        <path d="M50 10 L85 85 M50 10 L15 85 M30 50 L70 50" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="50" cy="10" r="6" fill="#38bdf8"/>
        <circle cx="85" cy="85" r="6" fill="#38bdf8"/>
        <circle cx="15" cy="85" r="6" fill="#38bdf8"/>
        <path d="M75 65 L95 45 L80 50 L75 65 Z" fill="#fbbf24" stroke="#1e293b" stroke-width="2"/>
    </svg>
    
    <div style="line-height: 1.1;">
        <h1 style="margin: 0; font-size: 1.5rem; color: #1e293b; font-weight: 800; letter-spacing: -1px;">ALONIXZ</h1>
        <span style="font-size: 0.7rem; color: #64748b; font-weight: 600; letter-spacing: 2px;">GROUP DEV</span>
    </div>
</div>
<div class="auth-card" id="card">
    <div class="fade-content" id="form-content">
        <div class="logo-dot"></div>
        <h2 id="title">EduSolve ID</h2>
        <p id="subtitle">Ingresa para ver tareas y exámenes</p>
        
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; justify-content: flex-start; padding-left: 5px;">
    <input type="checkbox" id="remember" style="width: auto; margin: 0; cursor: pointer;">
    <label for="remember" style="font-size: 0.8rem; color: #64748b; cursor: pointer; user-select: none;">Mantener sesión iniciada</label>
</div>
        <button onclick="handleAuth()" id="main-btn">Entrar al Panel</button>
        
        <p style="margin-top: 20px;">
            <span id="toggle-text">¿No tienes cuenta?</span> 
            <a href="#" onclick="toggleMode()" style="color: var(--primary); text-decoration: none; font-weight: 700;">Hazlo aquí</a>
        </p>

      <div class="device-alert" style="background: #ecfdf5; border-color: #a7f3d0; color: #065f46;">
    <span>🌐</span>
    <span>Cuenta Alonixz-ID: Tus datos se guardan en la nube y funcionan en cualquier equipo.</span>
</div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
<script>
    let isLogin = true;

    function toggleMode() {
        const content = document.getElementById('form-content');
        content.classList.add('fade-out');

        setTimeout(() => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "EduSolve ID" : "Crear Usuario";
            document.getElementById('subtitle').innerText = isLogin ? "Ingresa para ver tareas y exámenes" : "Regístrate en este dispositivo";
            document.getElementById('main-btn').innerText = isLogin ? "Entrar al Panel" : "Registrar ahora";
            document.getElementById('toggle-text').innerText = isLogin ? "¿No tienes cuenta?" : "¿Ya tienes cuenta?";
            
            content.classList.remove('fade-out');
        }, 300);
    }

async function handleAuth() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked; 
    
    if(!user || !pass) return alert("Completa todos los campos.");

    // Creamos un correo ficticio para que Firebase lo acepte
    const fakeEmail = `${user.toLowerCase()}@alonixz.com`;

    try {
        if (isLogin) {
            // --- LOGIN EN LA NUBE ---
            const userCredential = await firebase.auth().signInWithEmailAndPassword(fakeEmail, pass);
            const fbUser = userCredential.user;

            // Obtener datos extra desde Firestore (Rango, Puntos)
            const doc = await firebase.firestore().collection("usuarios").doc(fbUser.uid).get();
            const userData = doc.data();

            // Guardar en LocalStorage para que tu menú actual siga funcionando
            localStorage.setItem('user_name', user);
            localStorage.setItem('user_rank', userData.rango || 'Estudiante');
            localStorage.setItem('user_points', userData.puntos || 0);

            if (remember) {
                localStorage.setItem('remember_me', 'true');
            }

            console.log("✅ Sesión iniciada desde la Nube Alonixz");
            window.location.href = 'menu.html';

        } else { 
            // --- REGISTRO EN LA NUBE ---
            if (pass.length < 6) return alert("Mínimo 6 caracteres.");
            if (pass.toLowerCase() === user.toLowerCase()) return alert("Clave no puede ser igual al usuario.");

            // 1. Crear usuario en el sistema de autenticación
            const userCredential = await firebase.auth().createUserWithEmailAndPassword(fakeEmail, pass);
            const fbUser = userCredential.user;

            // 2. Guardar el perfil en la base de datos Firestore
            await firebase.firestore().collection("usuarios").doc(fbUser.uid).set({
                n: user,
                rango: "Estudiante", // Por defecto todos son gratis
                puntos: 0,
                creado: new Date().toISOString()
            });

            alert("¡Cuenta Alonixz-ID creada con éxito en la nube!");
            toggleMode();
        }
    } catch (error) {
        console.error(error);
        if (error.code === 'auth/user-not-found') alert("El usuario no existe.");
        else if (error.code === 'auth/wrong-password') alert("Contraseña incorrecta.");
        else if (error.code === 'auth/email-already-in-use') alert("Este nombre de usuario ya está tomado.");
        else alert("Error Alonixz-Cloud: " + error.message);
    }
}
</script>

</body>
</html>
