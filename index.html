<!DOCTYPE html>
<html lang="es">
<head><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 10 L85 85 M50 10 L15 85 M30 50 L70 50%22 fill=%22none%22 stroke=%22%2338bdf8%22 stroke-width=%2210%22/><path d=%22M75 65 L95 45 L80 50 L75 65 Z%22 fill=%22%23fbbf24%22/></svg>">
    <meta charset="UTF-8">
    <title>EduSolve | Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor con Animación de Entrada */
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Transición entre Login y Registro */
        .fade-content {
            transition: opacity 0.3s ease;
        }

        .fade-out { opacity: 0; }

        h2 { font-weight: 800; margin-bottom: 5px; color: #1e293b; }
        p { color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }/* --- ESTILO PARA LAPTOP (IGUAL QUE SIEMPRE) --- */
.card {
    width: 500px;
    padding: 40px;
}

/* --- ESTILO SOLO PARA CELULARES --- */
@media (max-width: 600px) {
    .card {
        width: 90%;   /* En celular la carta ocupa casi todo el ancho */
        padding: 15px; /* Menos espacio interno para que quepa el texto */
    }
    
    #welcome-name {
        font-size: 1.5rem; /* Título más cómodo para el dedo */
    }

    /* El panel admin se hace más grande para tocarlo fácil */
    #admin-panel div {
        width: 95% !important;
    }
}

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* Alerta de Dispositivo Local */
        .device-alert {
            margin-top: 25px;
            padding: 12px;
            background: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 10px;
            color: #9a3412;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; }
    </style>
</head>
<body>

<div class="auth-card" id="card">
    <div class="fade-content" id="form-content">
        <div class="logo-dot"></div>
        <h2 id="title">EduSolve ID</h2>
        <p id="subtitle">Ingresa para ver tareas y exámenes</p>
        
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; justify-content: flex-start; padding-left: 5px;">
    <input type="checkbox" id="remember" style="width: auto; margin: 0; cursor: pointer;">
    <label for="remember" style="font-size: 0.8rem; color: #64748b; cursor: pointer; user-select: none;">Mantener sesión iniciada</label>
</div>
        <button onclick="handleAuth()" id="main-btn">Entrar al Panel</button>
        
        <p style="margin-top: 20px;">
            <span id="toggle-text">¿No tienes cuenta?</span> 
            <a href="#" onclick="toggleMode()" style="color: var(--primary); text-decoration: none; font-weight: 700;">Hazlo aquí</a>
        </p>

      <div class="device-alert" style="background: #ecfdf5; border-color: #a7f3d0; color: #065f46;">
    <span>🌐</span>
    <span>Cuenta Alonixz-ID: Tus datos se guardan en la nube y funcionan en cualquier equipo.</span>
</div>
    </div>
</div>
<!-- 1. LIBRERÍAS DE FIREBASE (Versión Compat) -->
<!-- 1. LIBRERÍAS DE FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.14.0/firebase-firestore-compat.js"></script>

<!-- 2. CONFIGURACIÓN -->
<script src="firebase-config.js"></script>

<script>
    let isLogin = true;

    // --- 1. INICIO DEL SISTEMA ---
    window.onload = () => {
        if (typeof firebase === 'undefined') {
            console.error("❌ Error: Firebase no se cargó. Revisa firebase-config.js");
        } else {
            console.log("🚀 Alonixz-Cloud v3.5 Conectado");
            verificarMigracion(); 
            
            // Auto-login si "Recordarme" está activo
            firebase.auth().onAuthStateChanged((user) => {
                if (user && localStorage.getItem('remember_me') === 'true') {
                    window.location.href = 'menu.html';
                }
            });
        }
    };

    // --- 2. INTERFAZ (Cambio entre Login y Registro) ---
    function toggleMode() {
        const content = document.getElementById('form-content');
        if(!content) return;
        
        content.classList.add('fade-out');

        setTimeout(() => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "EduSolve ID" : "Crear Usuario";
            document.getElementById('subtitle').innerText = isLogin ? "Ingresa para ver tareas y exámenes" : "Regístrate en la nube Alonixz";
            document.getElementById('main-btn').innerText = isLogin ? "Entrar al Panel" : "Registrar ahora";
            document.getElementById('toggle-text').innerText = isLogin ? "¿No tienes cuenta?" : "¿Ya tienes cuenta?";
            
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            
            content.classList.remove('fade-out');
        }, 300);
    }

    // --- 3. AUTENTICACIÓN UNIVERSAL (Login / Registro) ---
    async function handleAuth() {
        if (typeof firebase === 'undefined') return alert("Error: Firebase no cargó correctamente.");

        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const rememberCheckbox = document.getElementById('remember');
        const remember = rememberCheckbox ? rememberCheckbox.checked : false;
        
        if(!user || !pass) return alert("Por favor, completa todos los campos.");
        
        const fakeEmail = `${user.toLowerCase()}@alonixz.com`;

        try {
            if (isLogin) {
                // --- MODO LOGIN ---
                const userCredential = await firebase.auth().signInWithEmailAndPassword(fakeEmail, pass);
                const fbUser = userCredential.user;
                
                // Traemos datos de Firestore
                const userDoc = await firebase.firestore().collection("usuarios").doc(fbUser.uid).get();
                const userData = userDoc.data() || {};

                // Guardamos en LocalStorage
                localStorage.setItem('eduSolve_User', user); 
                localStorage.setItem('user_name', user);
                localStorage.setItem('user_rank', userData.rango || 'Estudiante');
                localStorage.setItem('user_points', userData.puntos || 0);
                localStorage.setItem('alonixz_v35_nube', 'true');

                // Sincronización de Foto (Solo si existe en la nube)
                if (userData.foto && userData.foto.length > 100) {
                    localStorage.setItem('user_photo_base64', userData.foto);
                    console.log("📸 Foto sincronizada.");
                }

                if (remember) localStorage.setItem('remember_me', 'true');

                console.log("✅ Acceso concedido.");
                window.location.href = 'menu.html';

            } else {
                // --- MODO REGISTRO ---
                if (pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres.");

                const userCredential = await firebase.auth().createUserWithEmailAndPassword(fakeEmail, pass);
                
                // Creamos el perfil en la nube
                await firebase.firestore().collection("usuarios").doc(userCredential.user.uid).set({
                    n: user,
                    rango: "Estudiante",
                    puntos: 50,
                    foto: "", // Espacio vacío para la foto futura
                    creado: new Date().toISOString()
                });

                localStorage.setItem('eduSolve_User', user); 
                localStorage.setItem('user_name', user);
                localStorage.setItem('alonixz_v35_nube', 'true'); 

                alert("🚀 ¡Bienvenido a Alonixz-Cloud!");
                window.location.href = 'menu.html';
            }
        } catch (error) {
            console.error("Error Auth:", error.code);
            const errores = {
                'auth/wrong-password': "❌ Contraseña incorrecta.",
                'auth/user-not-found': "❌ El usuario no existe en la nube.",
                'auth/email-already-in-use': "⚠️ Este nombre de usuario ya está ocupado.",
                'auth/network-request-failed': "🌐 Revisa tu conexión a internet."
            };
            alert(errores[error.code] || "Error: " + error.message);
        }
    }

    // --- 4. SISTEMA DE MIGRACIÓN 3.5 ---
    async function verificarMigracion() {
        try {
            const doc = await firebase.firestore().collection("sistema").doc("configuracion").get();
            if (doc.exists) {
                const data = doc.data();
                const yaMigrado = localStorage.getItem('alonixz_v35_nube');
                const usuarioAntiguo = localStorage.getItem('user_name');

                if (Number(data.version_minima) >= 3.5 && yaMigrado !== 'true' && usuarioAntiguo) {
                    lanzarEvento35(); 
                }
            }
        } catch (e) { console.error("Error Versiones:", e); }
    }

    function lanzarEvento35() {
        setTimeout(() => {
            const modal = document.createElement('div');
            modal.id = "modal-migracion";
            modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px; backdrop-filter: blur(5px);";
            modal.innerHTML = `
                <div style="background:white; padding:30px; border-radius:20px; max-width:400px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                    <img src="actualizacion5.png" style="width:100px; margin-bottom:15px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/869/869124.png'">
                    <h2 style="color:#1e293b; margin-bottom:10px;">MIGRACIÓN A LA NUBE</h2>
                    <p style="color:#64748b; font-size:14px; margin-bottom:20px;">Tu cuenta actual es local. Para continuar, debemos pasar tus datos a la nueva infraestructura v3.5.</p>
                    <button onclick="ejecutarMigracionFinal()" style="background:#2563eb; color:white; border:none; padding:15px; border-radius:10px; cursor:pointer; width:100%; font-weight:bold; font-size:16px;">MIGRAR MI CUENTA</button>
                </div>`;
            document.body.appendChild(modal);
        }, 1000);
    }

    function ejecutarMigracionFinal() {
        localStorage.clear(); 
        localStorage.setItem('alonixz_v35_nube', 'pending');
        alert("🧹 Memoria local limpiada. Por favor, regístrate para crear tu cuenta en la nube.");
        location.reload();
    }
</script>
</body>
</html>
